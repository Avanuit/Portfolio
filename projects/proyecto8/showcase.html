<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8"/>
  <meta content="width=device-width, initial-scale=1.0" name="viewport"/>
  <title>Unchained | App Showcase</title>
  
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;700&display=swap" rel="stylesheet"/>
  <script src="https://cdn.tailwindcss.com"></script>
  
  <style>
    body {
      font-family: 'Space Grotesk', sans-serif;
      background-color: #050505;
      color: #ffffff;
      margin: 0;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      background-image: 
        radial-gradient(1px 1px at 20px 30px, #ffffff, rgba(0,0,0,0)),
        radial-gradient(1px 1px at 40px 70px, #ffffff, rgba(0,0,0,0)),
        radial-gradient(1px 1px at 50px 160px, #ffffff, rgba(0,0,0,0)),
        radial-gradient(1px 1px at 90px 40px, #ffffff, rgba(0,0,0,0)),
        radial-gradient(1px 1px at 130px 80px, #ffffff, rgba(0,0,0,0));
      background-size: 200px 200px;
    }

    /* Brillo adaptado a Neptuno para los textos */
    .neon-text-blue {
      text-shadow: 0 0 10px #4f46e5, 0 0 20px #4f46e5;
      color: #4f46e5;
    }

    .phone-container {
      flex-grow: 1;
      display: flex;
      justify-content: center;
      align-items: center;
      padding: 2rem;
    }

    /* Brillo del teléfono adaptado a Neptuno */
    .phone-mockup {
      width: 375px;        
      height: 812px;       
      background-color: #000;
      border: 14px solid #1a1a1a;
      border-radius: 40px;
      /* Luz de neón azul detrás del teléfono */
      box-shadow: 
        0 0 40px rgba(79, 70, 229, 0.4), 
        inset 0 0 15px rgba(255, 255, 255, 0.1); 
      position: relative;
      overflow: hidden;
      animation: float 6s ease-in-out infinite;
    }

    @keyframes float {
      0% { transform: translateY(0px); }
      50% { transform: translateY(-15px); }
      100% { transform: translateY(0px); }
    }

    .phone-mockup::before {
      content: '';
      position: absolute;
      top: 0;
      left: 50%;
      transform: translateX(-50%);
      width: 150px;
      height: 25px;
      background-color: #1a1a1a;
      border-bottom-left-radius: 18px;
      border-bottom-right-radius: 18px;
      z-index: 10;
    }

    .phone-buttons::before, .phone-buttons::after {
      content: '';
      position: absolute;
      background: #1a1a1a;
      width: 4px;
      border-radius: 2px;
    }
    .phone-buttons::before {
      top: 120px;
      left: -18px;
      height: 100px;
      box-shadow: 0 40px 0 #1a1a1a;
    }
    .phone-buttons::after {
      top: 140px;
      right: -18px;
      height: 60px;
    }

    .phone-mockup iframe {
      width: 100%;
      height: 100%;
      border: none;
      border-radius: 26px; 
      background-color: #000;
    }
  </style>
</head>
<body>

  <header class="w-full p-8 flex justify-between items-center relative z-20">
    <a href="../../index.html" class="uppercase text-xs font-bold tracking-widest text-gray-400 hover:text-[#4f46e5] transition-colors flex items-center gap-2">
      <span class="text-lg">←</span> ABORTAR MISION(VOLVER AL SISTEMA)
    </a>
    <div class="text-right hidden md:block">
      <h1 class="text-xl font-bold uppercase tracking-widest neon-text-blue">UNCHAINED</h1>
      <p class="text-[10px] text-gray-500 tracking-[0.2em] uppercase">DISPOSITIVO MOVIL ACTIVO</p>
    </div>
  </header>

  <main class="phone-container relative z-10">
    <div class="phone-buttons relative">
      <div class="phone-mockup">
        <iframe src="index.html" title="Unchained Mobile App"></iframe>
      </div>
    </div>
  </main>

</body>
</html>
